<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<title>Register</title>
</head>

<body class="login-page login-enhanced">

<div class="login-bg-shape shape-one"></div>
<div class="login-bg-shape shape-two"></div>
<div class="login-bg-shape shape-three"></div>

<div class="login-header">

<p class="auth-badge">Personal Finance Companion</p>
<h1>Smart Budget Planner</h1>
<p class="auth-tagline">Take control of your expenses with our powerful expense tracking tools</p>

</div>

<div class="login-center">

<div class="card auth-card">

<h2>Create Account</h2>
<p class="auth-card-note">Create your account and start tracking your financial growth.</p>

<form method="POST">

<input name="username" placeholder="Username" autocomplete="username" required>
<input name="password" type="password" placeholder="Password (min 6 characters)" minlength="6" autocomplete="new-password" required>
<input name="confirm_password" type="password" placeholder="Confirm Password" minlength="6" autocomplete="new-password" required>

<select name="security_question" required>
<option value="" disabled selected>Select Recovery Question</option>
{% for key, question in recovery_questions.items() %}
<option value="{{ key }}">{{ question }}</option>
{% endfor %}
</select>

<input name="security_answer" placeholder="Recovery Answer" autocomplete="off" required>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<button type="submit">Register</button>

</form>

<div class="auth-links">
<a href="/">Back to Login</a>
<a href="/forgot-password">Forgot Password?</a>
</div>

</div>

</div>

</body>
</html>
