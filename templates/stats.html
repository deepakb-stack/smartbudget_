<!DOCTYPE html>
<html>
<head>
<title>Statistics</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

<style>

.stat-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.progress{
background:#eee;
height:8px;
border-radius:6px;
margin-top:10px;
}

.progress-bar{
height:8px;
background:#2f5bd3;
border-radius:6px;
}

.chart-box{
background:white;
padding:20px;
margin-top:20px;
border-radius:12px;
text-align:center;
}

</style>
</head>

<body>

<div class="dashboard">

<h2>Statistics</h2>

<div class="stat-grid">

<div class="stat-card">
<h4>Total Income</h4>
<h2>₹15,000</h2>
<div class="progress">
<div class="progress-bar" style="width:70%"></div>
</div>
</div>

<div class="stat-card">
<h4>Total Expense</h4>
<h2>₹9,500</h2>
<div class="progress">
<div class="progress-bar" style="width:45%; background:red;"></div>
</div>
</div>

<div class="stat-card">
<h4>Savings</h4>
<h2>₹5,500</h2>
</div>

<div class="stat-card">
<h4>Savings Rate</h4>
<h2>36%</h2>
</div>

</div>

<div class="chart-box">
<h4>Spending Chart</h4>
<p>Chart integration ready (Chart.js can be added)</p>
</div>

<div class="nav">
<a href="/home">Home</a>
<a href="/stats">Stats</a>
<a href="/advisor">Advisor</a>
<a href="/settings">Settings</a>
</div>

</div>

</body>
</html>
